<!DOCTYPE html>
<html>
<head>
  <title>Painel do Gestor</title>

  <style>

    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6fb;
    }

    .header {
      background: #0b1f3a;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-sair {
      background: #e74c3c;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    .escola {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .escola h2 {
      margin: 0 0 10px 0;
      color: #0b1f3a;
    }

    .card {
      background: #f9fafc;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }

    .info {
      font-size: 14px;
    }

    .btn {
      background: #f1c40f;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

  </style>
</head>

<body>

<div class="header">
  <h1>📊 Painel do Gestor</h1>
  <button class="btn-sair" onclick="logout()">Sair</button>
</div>

<div class="container">
  <div id="lista">Carregando...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
  authDomain: "pepi-brasil.firebaseapp.com",
  projectId: "pepi-brasil"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {

  if(!user){
    window.location.href = "login.html";
    return;
  }

  db.collection("certificados")
  .where("gestorId", "==", user.uid)
  .get()
  .then(snapshot => {

    let agrupado = {};

    snapshot.forEach(doc => {
      let d = doc.data();

      if(!agrupado[d.escola]){
        agrupado[d.escola] = [];
      }

      agrupado[d.escola].push({
        ...d,
        codigo: doc.id
      });
    });

    let html = "";

    for(let escola in agrupado){

      html += `
        <div class="escola">
          <h2>${escola}</h2>
      `;

      agrupado[escola].forEach(aluno => {

        html += `
          <div class="card">
            <div class="info">
              ${aluno.nome} - ${aluno.turma}
            </div>

            <a href="validar.html?codigo=${aluno.codigo}">
              <button class="btn">Validar</button>
            </a>
          </div>
        `;
      });

      html += `</div>`;
    }

    document.getElementById("lista").innerHTML = html;

  });

});

function logout(){
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
