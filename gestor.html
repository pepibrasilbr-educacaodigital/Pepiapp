<!DOCTYPE html>
<html>
<head>
  <title>Painel do Gestor</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6fb;
    }

    .header {
      background: #0b1f3a;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-sair {
      background: #e74c3c;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card-top {
      background: white;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    canvas {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .escola {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .card {
      background: #f9fafc;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>📊 Painel do Gestor</h1>
  <button class="btn-sair" onclick="logout()">Sair</button>
</div>

<div class="container">

  <div class="cards">
    <div class="card-top">
      <h2 id="total">0</h2>
      <p>Certificados</p>
    </div>
  </div>

  <canvas id="grafico"></canvas>

  <div id="lista"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- GRÁFICO -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
  authDomain: "pepi-brasil.firebaseapp.com",
  projectId: "pepi-brasil"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {

  if(!user){
    window.location.href = "login.html";
    return;
  }

  db.collection("certificados")
  .where("gestorId", "==", user.uid)
  .get()
  .then(snapshot => {

    let total = snapshot.size;
    document.getElementById("total").innerText = total;

    let escolas = {};
    let html = "";

    snapshot.forEach(doc => {

      let d = doc.data();

      if(!escolas[d.escola]){
        escolas[d.escola] = 0;
      }

      escolas[d.escola]++;

    });

    // 🔥 GRÁFICO
    let labels = Object.keys(escolas);
    let valores = Object.values(escolas);

    new Chart(document.getElementById("grafico"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Certificados por escola",
          data: valores
        }]
      }
    });

    // LISTA
    for(let escola in escolas){
      html += `<div class="escola"><h3>${escola}</h3></div>`;
    }

    document.getElementById("lista").innerHTML = html;

  });

});

function logout(){
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
