<!DOCTYPE html>
<html>
<head>
  <title>Área do Gestor - PEPI</title>

  <style>
    body {
      font-family: Arial;
      background-color: #0b1f3a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      width: 80%;
      max-width: 500px;
    }

    .button {
      background: #f1c40f;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      color: black;
      display: inline-block;
      margin-top: 10px;
      font-weight: bold;
      width: 80%;
      max-width: 300px;
    }

    .button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<h1>Área do Gestor</h1>

<div class="box">
  <h3>📊 Relatórios</h3>
  <p>Acompanhe o desempenho dos alunos</p>
  <a class="button" href="#">Ver relatórios</a>
</div>

<div class="box">
  <h3>👨‍🎓 Gestão de Alunos</h3>
  <p>Controle de acesso e progresso</p>
  <a class="button" href="#">Gerenciar alunos</a>
</div>

<div class="box">
  <h3>📚 Conteúdos</h3>
  <p>Atualizar materiais e apostilas</p>
  <a class="button" href="#">Editar conteúdos</a>
</div>

<div class="box">
  <h3>⚙️ Configurações</h3>
  <p>Personalizar o programa</p>
  <a class="button" href="#">Configurar</a>
</div>

<br>

<a href="index.html" class="button">⬅ Voltar</a>

</body>
</html>
