<!DOCTYPE html>
<html>
<head>
  <title>Painel do Gestor</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn-sair {
      background: #e74c3c;
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .card {
      background: white;
      color: black;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .codigo {
      font-weight: bold;
      color: #0b1f3a;
    }

    .btn {
      background: #f1c40f;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="topo">
  <h1>📊 Painel do Gestor</h1>
  <button class="btn-sair" onclick="logout()">Sair</button>
</div>

<div id="lista">Carregando...</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const firebaseConfig = {
    apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
    authDomain: "pepi-brasil.firebaseapp.com",
    projectId: "pepi-brasil",
    storageBucket: "pepi-brasil.appspot.com",
    messagingSenderId: "937753921449",
    appId: "1:937753921449:web:b10c09928e625a905526b8"
  };

  // 🔥 EVITA ERRO DE DUPLICAÇÃO
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }

  const db = firebase.firestore();

  // 🔐 PROTEÇÃO DE LOGIN
  firebase.auth().onAuthStateChanged(function(user) {

    if (!user) {
      window.location.href = "login.html";
    } else {
      carregarCertificados();
    }

  });

  // 🚪 LOGOUT
  window.logout = function(){
    firebase.auth().signOut().then(() => {
      window.location.href = "login.html";
    });
  }

  // 📊 CARREGAR CERTIFICADOS
  function carregarCertificados(){

    db.collection("certificados").get().then(snapshot => {

      let html = "";

      if(snapshot.empty){
        html = "<p style='color:white;'>Nenhum certificado ainda.</p>";
      }

      snapshot.forEach(doc => {

        let dados = doc.data();

        html += `
          <div class="card">
            <p><strong>Nome:</strong> ${dados.nome}</p>
            <p><strong>Turma:</strong> ${dados.turma}</p>
            <p><strong>Data:</strong> ${dados.data}</p>
            <p class="codigo">Código: ${doc.id}</p>

            <a href="validar.html?codigo=${doc.id}">
              <button class="btn">🔎 Validar</button>
            </a>
          </div>
        `;
      });

      document.getElementById("lista").innerHTML = html;

    });

  }

});
</script>

</body>
</html>
