<!DOCTYPE html>
<html>
<head>
  <title>Painel do Gestor</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      padding: 20px;
    }

    .escola {
      margin-top: 20px;
      padding: 15px;
      background: #1c3d6e;
      border-radius: 10px;
    }

    .card {
      background: white;
      color: black;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Painel por Escola</h1>

<div id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
  authDomain: "pepi-brasil.firebaseapp.com",
  projectId: "pepi-brasil",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {

  if(!user){
    window.location.href = "login.html";
    return;
  }

  db.collection("certificados")
  .where("gestorId", "==", user.uid)
  .get()
  .then(snapshot => {

    let agrupado = {};

    snapshot.forEach(doc => {
      let d = doc.data();

      if(!agrupado[d.escola]){
        agrupado[d.escola] = [];
      }

      agrupado[d.escola].push(d);
    });

    let html = "";

    for(let escola in agrupado){

      html += `<div class="escola"><h2>${escola}</h2>`;

      agrupado[escola].forEach(aluno => {
        html += `
          <div class="card">
            ${aluno.nome} - ${aluno.turma}
          </div>
        `;
      });

      html += `</div>`;
    }

    document.getElementById("lista").innerHTML = html;

  });

});
</script>

</body>
</html>
