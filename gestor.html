<!DOCTYPE html>
<html>
<head>
  <title>Painel do Gestor</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6fb;
    }

    .header {
      background: #0b1f3a;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-sair {
      background: #e74c3c;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    .btn-relatorio {
      margin: 10px 0;
      padding: 12px;
      background: #0b1f3a;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .card-top {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
    }

    .escola {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

  </style>
</head>

<body>

<div class="header">
  <h1>📊 Painel do Gestor</h1>
  <button class="btn-sair" onclick="logout()">Sair</button>
</div>

<div class="container">

  <button class="btn-relatorio" onclick="gerarRelatorio()">
    📄 Gerar Relatório Profissional
  </button>

  <div class="card-top">
    <h2 id="total">0</h2>
    <p>Total de Certificados</p>
  </div>

  <div id="lista"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
  authDomain: "pepi-brasil.firebaseapp.com",
  projectId: "pepi-brasil"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let dadosGlobais = [];

firebase.auth().onAuthStateChanged(user => {

  if(!user){
    window.location.href = "login.html";
    return;
  }

  db.collection("certificados")
  .where("gestorId", "==", user.uid)
  .get()
  .then(snapshot => {

    dadosGlobais = [];

    document.getElementById("total").innerText = snapshot.size;

    let escolas = {};
    let html = "";

    snapshot.forEach(doc => {

      let d = doc.data();

      dadosGlobais.push({
        ...d,
        codigo: doc.id
      });

      if(!escolas[d.escola]){
        escolas[d.escola] = [];
      }

      escolas[d.escola].push(d);

    });

    for(let escola in escolas){

      html += `
        <div class="escola">
          <h3 style="color:#0b1f3a;">🏫 ${escola}</h3>
          <p>${escolas[escola].length} alunos certificados</p>
        </div>
      `;
    }

    document.getElementById("lista").innerHTML = html;

  });

});


// 🔥 RELATÓRIO PREMIUM
function gerarRelatorio(){

  let agrupado = {};

  dadosGlobais.forEach(item => {
    if(!agrupado[item.escola]){
      agrupado[item.escola] = [];
    }
    agrupado[item.escola].push(item);
  });

  let htmlEscolas = "";

  for(let escola in agrupado){

    htmlEscolas += `
      <div style="margin-bottom:30px;">
        <h2 style="color:#0b1f3a;">🏫 ${escola}</h2>
        <p><strong>Total:</strong> ${agrupado[escola].length} alunos</p>
    `;

    agrupado[escola].forEach(aluno => {
      htmlEscolas += `
        <p>• ${aluno.nome} — ${aluno.turma}</p>
      `;
    });

    htmlEscolas += `</div>`;
  }

  let novaJanela = window.open("", "_blank");

  novaJanela.document.write(`
    <html>
    <body style="font-family:Arial;margin:0;">

      <div style="background:#0b1f3a;color:white;padding:30px;text-align:center;">
        <h1>PEPI Brasil</h1>
        <p>Relatório Oficial de Certificação</p>
      </div>

      <div style="padding:30px;">

        <h2 style="color:#c9a227;">Resumo Geral</h2>
        <p><strong>Total de certificados emitidos:</strong> ${dadosGlobais.length}</p>

        ${htmlEscolas}

        <br><br>

        <button onclick="window.print()" style="
          padding:12px;
          background:#0b1f3a;
          color:white;
          border:none;
          border-radius:8px;
          cursor:pointer;
        ">
          📄 Baixar PDF
        </button>

      </div>

    </body>
    </html>
  `);
}


// logout
function logout(){
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
