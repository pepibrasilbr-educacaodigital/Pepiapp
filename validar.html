<!DOCTYPE html>
<html>
<head>
  <title>Validação</title>
</head>

<body style="font-family:Arial;text-align:center;padding:50px;">

<h2>Validação de Certificado</h2>

<p id="status">Verificando...</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
  authDomain: "pepi-brasil.firebaseapp.com",
  projectId: "pepi-brasil",
  storageBucket: "pepi-brasil.appspot.com",
  messagingSenderId: "937753921449",
  appId: "1:937753921449:web:b10c09928e625a905526b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let params = new URLSearchParams(window.location.search);
let codigo = params.get("codigo");

let ref = doc(db, "certificados", codigo);
let snap = await getDoc(ref);

if(snap.exists()){
  document.getElementById("status").innerHTML = "✅ Certificado válido";
}else{
  document.getElementById("status").innerHTML = "❌ Certificado inválido";
}
</script>

</body>
</html>
