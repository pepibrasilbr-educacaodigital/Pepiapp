<!DOCTYPE html>
<html>
<head>
  <title>Validação de Certificado</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
      background: #0b1f3a;
      color: white;
    }

    .box {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    .valido {
      color: green;
      font-weight: bold;
      font-size: 18px;
    }

    .codigo {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Validação de Certificado</h2>

  <p id="codigo" class="codigo"></p>

  <p class="valido">✅ Certificado válido</p>

  <p>Emitido pela PEPI Brasil</p>
</div>

<script>
let params = new URLSearchParams(window.location.search);
let codigo = params.get("codigo");

document.getElementById("codigo").innerText = "Código: " + codigo;
</script>

</body>
</html>
