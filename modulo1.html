<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Módulo 1</title>

<style>
body{margin:0;font-family:Arial;background:#0b1f3a;color:white;}
.container{padding:40px;max-width:800px;margin:auto;}
.box{background:white;color:black;padding:25px;border-radius:12px;margin-bottom:20px;}
button{width:100%;padding:12px;border:none;border-radius:8px;background:#f1c40f;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h1>Módulo 1</h1>
<p>Conteúdo do módulo 1</p>
</div>

<div class="box">
<button onclick="concluir()">✅ Concluir Módulo</button>
</div>

</div>

<script>

function concluir(){

  let atual = parseInt(localStorage.getItem("moduloAtual")) || 1;

  if(atual === 1){
    localStorage.setItem("moduloAtual", 2);
  }

  window.location.href = "aluno.html";

}

</script>

</body>
</html>
