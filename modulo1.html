<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Módulo 1</title>

<style>
body{margin:0;font-family:Arial;background:#0b1f3a;color:white;}
.topo{padding:20px 40px;color:#f1c40f;font-weight:bold;}
.container{padding:40px;max-width:800px;margin:auto;}
.box{background:white;color:black;padding:25px;border-radius:12px;margin-bottom:20px;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:#f1c40f;font-weight:bold;cursor:pointer;}

</head>

<body>

<div class="topo">PEPI Brasil • Módulo 1</div>

<div class="container">

<div class="box">

</div>

<div class="box">
<ul>
<li>A internet conecta pessoas</li>
<li>Redes sociais compartilham conteúdos</li>
<li>Tudo deixa rastro digital</li>
</ul>
</div>

<div class="box">
<button onclick="window.open('modulo1.pdf')">📥 Baixar Apostila</button>
<button onclick="concluir()">✅ Concluir</button>
</div>

</div>

<script>
function concluir(){
let atual = parseInt(localStorage.getItem("moduloAtual")) || 1;
if(atual === 1){
localStorage.setItem("moduloAtual", 2);
window.location.href="aluno.html";
}
}
</script>
