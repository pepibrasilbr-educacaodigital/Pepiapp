<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Módulo 1 • PEPI Brasil</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f3a;
  color:white;
}

.topo{
  padding:20px 40px;
  color:#f1c40f;
  font-weight:bold;
}

.container{
  padding:40px;
  max-width:800px;
  margin:auto;
}

.box{
  background:white;
  color:black;
  padding:25px;
  border-radius:12px;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#f1c40f;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topo">PEPI Brasil • Módulo 1</div>

<div class="container">

<div class="box">
<h1>🌐 Introdução ao Mundo Digital</h1>

<p>
Neste módulo, você vai compreender o funcionamento do ambiente digital.
</p>

<ul>
<li>O que é internet</li>
<li>Redes sociais</li>
<li>Identidade digital</li>
</ul>

</div>

<!-- 🔥 BOTÃO DO PDF -->
<div class="box">
<button onclick="window.open('modulo1.pdf')">
📥 Baixar Apostila do Módulo
</button>
</div>

<div class="box">
<button onclick="concluir()">✅ Concluir Módulo</button>
</div>

</div>

<script>

function concluir(){

  let atual = parseInt(localStorage.getItem("moduloAtual")) || 1;

  if(atual === 1){
    localStorage.setItem("moduloAtual", 2);
  }

  window.location.href = "aluno.html";

}

</script>

</body>
</html>
