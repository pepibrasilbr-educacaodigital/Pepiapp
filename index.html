<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEPI Brasil</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#081426;
  color:white;
}
.container {
  padding:20px;
}
.card {
  background:#13263f;
  padding:15px;
  border-radius:12px;
  margin:12px 0;
}
.button {
  margin:12px 0;
  padding:16px;
  background:#facc15;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}
.secondary {
  background:#1e3a5f;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
function home(){
document.getElementById("app").innerHTML=`
<div class="container">
<h2>PEPI Brasil</h2>
<div class="card">Educação e proteção digital</div>

<div class="button" onclick="modulo('Segurança Digital')">Segurança Digital</div>
<div class="button" onclick="modulo('Exposição Online')">Exposição Online</div>
<div class="button" onclick="modulo('Responsabilidade Legal')">Responsabilidade Legal</div>
</div>`;
}

function modulo(nome){
document.getElementById("app").innerHTML=`
<div class="container">
<h2>${nome}</h2>

<div class="card">Conteúdo educativo estruturado</div>

<div class="button">Baixar material</div>
<div class="button" onclick="atividade()">Fazer atividade</div>
<div class="button secondary" onclick="home()">Voltar</div>
</div>`;
}

function atividade(){
document.getElementById("app").innerHTML=`
<div class="container">
<h2>Atividade</h2>

<div class="card">Qual atitude é segura?</div>

<div class="button">Não compartilhar dados</div>
<div class="button">Aceitar desconhecidos</div>

<div class="button" onclick="home()">Enviar</div>
</div>`;
}

home();
</script>

</body>
</html>
