<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PEPI Brasil</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f3a;
  color:white;
}

/* TOPO */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo{
  color:#f1c40f;
  font-weight:bold;
  font-size:20px;
}

/* HERO */
.hero{
  padding:80px 40px;
  text-align:center;
}

.hero h1{
  font-size:40px;
}

.hero p{
  margin-top:10px;
  opacity:0.8;
}

/* BOTÕES */
.btn{
  padding:14px 24px;
  border:none;
  border-radius:8px;
  background:#f1c40f;
  font-weight:bold;
  margin:10px;
  cursor:pointer;
}

/* SEÇÕES */
.section{
  padding:40px;
}

.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  background:#142c54;
  padding:25px;
  border-radius:12px;
  width:280px;
}

.card h3{
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">PEPI Brasil</div>
</div>

<div class="hero">
  <h1>Educação Digital e Proteção Infantil</h1>
  <p>Plataforma completa para escolas, alunos e educadores</p>

  <button class="btn" onclick="window.location.href='aluno.html'">
    🎓 Acessar Plataforma
  </button>
</div>

<div class="section">

<h2>📚 Soluções</h2>

<div class="cards">

<div class="card">
<h3>Plataforma Educacional</h3>
<p>Módulos com certificação</p>
<button class="btn" onclick="window.location.href='aluno.html'">Acessar</button>
</div>

<div class="card">
<h3>Palestras</h3>
<p>Conteúdos para alunos</p>
<button class="btn" onclick="window.location.href='palestras.html'">Ver</button>
</div>

<div class="card">
<h3>Formações</h3>
<p>Capacitação para equipe escolar</p>
<button class="btn" onclick="window.location.href='formacoes.html'">Ver</button>
</div>

</div>

</div>

</body>
</html>
