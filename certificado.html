<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificado</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #0b1f3a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CERTIFICADO */
.certificado {
  width: 900px;
  background: white;
  padding: 50px;
  border: 8px solid #0b1f3a;
  text-align: center;
  position: relative;
}

/* DETALHE DOURADO */
.certificado::before {
  content: "";
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  bottom: 10px;
  border: 2px solid #f1c40f;
}

/* TITULO */
h1 {
  font-size: 36px;
  color: #0b1f3a;
  margin-bottom: 10px;
}

/* SUB */
.sub {
  font-size: 14px;
  color: #555;
}

/* NOME */
.nome {
  font-size: 32px;
  font-weight: bold;
  margin: 25px 0;
  color: #000;
}

/* TEXTO */
.texto {
  font-size: 16px;
  margin: 10px 0;
}

/* CURSO */
.curso {
  font-size: 20px;
  font-weight: bold;
  margin: 20px 0;
}

/* INFO */
.info {
  margin-top: 15px;
  font-size: 14px;
}

/* RODAPÉ */
.footer {
  margin-top: 40px;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #555;
}

/* BOTÃO */
button {
  margin-top: 25px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #f1c40f;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="certificado">

  <h1>Certificado de Conclusão</h1>
  <div class="sub">PEPI Brasil • Educação Digital</div>

  <div class="texto">Certificamos que</div>

  <div class="nome" id="nome"></div>

  <div class="texto">concluiu com êxito o programa de</div>

  <div class="curso">Educação Digital e Proteção Online</div>

  <div class="info" id="escola"></div>
  <div class="info" id="data"></div>

  <div class="footer">
    <div>PEPI Brasil</div>
    <div>Educação Digital para Todos</div>
  </div>

  <button onclick="window.print()">🖨️ Baixar / Imprimir</button>

</div>

<script>

// NOME
document.getElementById("nome").innerText =
localStorage.getItem("nome") || "Aluno";

// ESCOLA
document.getElementById("escola").innerText =
"Instituição: " + (localStorage.getItem("escola") || "");

// DATA
let hoje = new Date();
document.getElementById("data").innerText =
"Data: " + hoje.toLocaleDateString();

</script>

</body>
</html>
