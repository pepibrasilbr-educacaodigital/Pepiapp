<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificado</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1f3a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.certificado {
  background: white;
  padding: 40px;
  width: 800px;
  text-align: center;
  border-radius: 12px;
}

h1 {
  color: #0b1f3a;
}

.nome {
  font-size: 26px;
  font-weight: bold;
  margin: 20px 0;
}

.info {
  margin-top: 10px;
}

button {
  margin-top: 20px;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: #f1c40f;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="certificado" id="certificado">

  <h1>Certificado de Conclusão</h1>

  <p>Certificamos que</p>

  <div class="nome" id="nome"></div>

  <p>concluiu o programa de</p>

  <h3>Educação Digital</h3>

  <div class="info" id="escola"></div>
  <div class="info" id="data"></div>

  <button onclick="baixar()">📄 Baixar Certificado</button>

</div>

<script>

// DADOS
document.getElementById("nome").innerText =
localStorage.getItem("nome") || "Aluno";

document.getElementById("escola").innerText =
"Escola: " + (localStorage.getItem("escola") || "");

let hoje = new Date();
document.getElementById("data").innerText =
"Data: " + hoje.toLocaleDateString();

// 🔥 FUNÇÃO CORRIGIDA
function baixar(){

  window.print();

}

</script>

</body>
</html>
