<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Certificado</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #0b1f3a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.certificado {
  width: 900px;
  background: white;
  padding: 50px;
  border: 8px solid #0b1f3a;
  text-align: center;
  position: relative;
}

.certificado::before {
  content: "";
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  bottom: 10px;
  border: 2px solid #f1c40f;
}

h1 {
  font-size: 36px;
  color: #0b1f3a;
}

.nome {
  font-size: 32px;
  font-weight: bold;
  margin: 25px 0;
}

.curso {
  font-size: 20px;
  font-weight: bold;
  margin: 20px 0;
}

.info {
  margin-top: 10px;
}

.footer {
  margin-top: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ASSINATURA */
.assinatura {
  text-align: left;
}

.assinatura img {
  width: 220px;
}

/* QR */
.qr {
  text-align: right;
}

button {
  margin-top: 20px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #f1c40f;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="certificado">

  <h1>Certificado de Conclusão</h1>

  <p>Certificamos que</p>

  <div class="nome" id="nome"></div>

  <p>concluiu o programa de</p>

  <div class="curso">Educação Digital e Proteção Online</div>

  <div class="info" id="escola"></div>
  <div class="info" id="data"></div>
  <div class="info" id="codigo"></div>

  <div class="footer">

    <!-- ASSINATURA -->
    <div class="assinatura">
      <img src="assinatura.PNG">
      <div>PEPI Brasil</div>
    </div>

    <!-- QR CODE -->
    <div class="qr">
      <img id="qrcode">
      <div style="font-size:12px;">Validar certificado</div>
    </div>

  </div>

  <button onclick="window.print()">🖨️ Baixar / Imprimir</button>

</div>

<script>

// DADOS
let nome = localStorage.getItem("nome") || "Aluno";
let escola = localStorage.getItem("escola") || "";

// GERAR CÓDIGO
let codigo = "PEPI-" + Math.floor(Math.random()*1000000);

// DATA
let hoje = new Date().toLocaleDateString();

// INSERIR
document.getElementById("nome").innerText = nome;
document.getElementById("escola").innerText = "Instituição: " + escola;
document.getElementById("data").innerText = "Data: " + hoje;
document.getElementById("codigo").innerText = "Código: " + codigo;

// QR CODE
let urlValidacao = "https://pepibrasilbr-educacaodigital.github.io/Pepiapp/?certificado=" + codigo;

document.getElementById("qrcode").src =
"https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + encodeURIComponent(urlValidacao);

</script>

</body>
</html>
