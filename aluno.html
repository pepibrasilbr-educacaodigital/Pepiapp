<!DOCTYPE html>
<html>
<head>
  <title>Área do Aluno</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .modulo {
      background: white;
      color: black;
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      width: 300px;
      text-decoration: none;
      display: block;
      font-weight: bold;
    }

    .bloqueado {
      background: gray;
      pointer-events: none;
      opacity: 0.6;
    }

    .concluido {
      background: #2ecc71;
      color: white;
    }
  </style>
</head>

<body>

<h1>Área do Aluno</h1>

<a id="m1" href="modulo1.html" class="modulo">Módulo 1</a>
<a id="m2" href="modulo2.html" class="modulo">Módulo 2</a>
<a id="m3" href="modulo3.html" class="modulo">Módulo 3</a>
<a id="m4" href="modulo4.html" class="modulo">Módulo 4</a>
<a id="m5" href="modulo5.html" class="modulo">Módulo 5</a>
<a id="m6" href="modulo6.html" class="modulo">Módulo 6</a>

<script>
function atualizar(){
  for(let i=1; i<=6; i++){
    let modulo = document.getElementById("m"+i);

    if(localStorage.getItem("modulo"+i) === "concluido"){
      modulo.classList.add("concluido");
      modulo.innerText = "Módulo " + i + " ✅";
    }

    if(i > 1 && !localStorage.getItem("modulo"+(i-1))){
      modulo.classList.add("bloqueado");
    }
  }
}

atualizar();
</script>

</body>
</html>
