<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Área do Aluno</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1f3a;
  color: white;
}

/* TOPO */
.topo {
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
}

.nome {
  color: #f1c40f;
  font-weight: bold;
}

/* PROGRESSO */
.progresso-container {
  padding: 0 40px;
  margin-bottom: 20px;
}

.barra-bg {
  background: #444;
  height: 12px;
  border-radius: 10px;
}

.barra {
  height: 12px;
  background: #f1c40f;
  width: 0%;
  border-radius: 10px;
}

/* TEXTO PROGRESSO */
.info {
  padding: 0 40px;
  margin-bottom: 20px;
}

/* GRID */
.container {
  padding: 40px;
}

.grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #142c54;
  padding: 20px;
  border-radius: 10px;
  width: 260px;
}

.locked {
  opacity: 0.4;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #f1c40f;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topo">
  <div>Área do Aluno</div>
  <div class="nome" id="nomeAluno"></div>
</div>

<div class="info" id="textoProgresso"></div>

<div class="progresso-container">
  <div class="barra-bg">
    <div class="barra" id="barra"></div>
  </div>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>

// NOME
document.getElementById("nomeAluno").innerText =
localStorage.getItem("nome") || "";

// PROGRESSO
let atual = parseInt(localStorage.getItem("moduloAtual")) || 1;

const total = 6;

// CALCULAR %
let porcentagem = ((atual-1) / total) * 100;

// BARRA
document.getElementById("barra").style.width = porcentagem + "%";

// TEXTO
document.getElementById("textoProgresso").innerText =
"Você concluiu " + (atual-1) + " de " + total + " módulos";

// MÓDULOS
const modulos = [
  "modulo1.html",
  "modulo2.html",
  "modulo3.html",
  "modulo4.html",
  "modulo5.html",
  "modulo6.html"
];

let grid = document.getElementById("grid");

modulos.forEach((m, index) => {

  let liberado = index < atual;

  let div = document.createElement("div");
  div.className = "card " + (liberado ? "" : "locked");

  div.innerHTML = `
    <h3>Módulo ${index+1}</h3>

    <button ${liberado ? "" : "disabled"}
    onclick="window.location.href='${m}'">
      Ver Módulo
    </button>
  `;

  grid.appendChild(div);

});

</script>

</body>
</html>
