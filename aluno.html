<!DOCTYPE html>
<html>
<head>
  <title>Área do Aluno</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .modulo {
      background: white;
      color: black;
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      width: 300px;
      text-decoration: none;
      display: block;
      font-weight: bold;
    }

    .concluido {
      background: #2ecc71;
      color: white;
    }
  </style>
</head>

<body>

<h1>Área do Aluno</h1>

<a id="m1" href="modulo1.html" class="modulo">Módulo 1</a>
<a id="m2" href="modulo2.html" class="modulo">Módulo 2</a>
<a id="m3" href="modulo3.html" class="modulo">Módulo 3</a>
<a id="m4" href="modulo4.html" class="modulo">Módulo 4</a>
<a id="m5" href="modulo5.html" class="modulo">Módulo 5</a>
<a id="m6" href="modulo6.html" class="modulo">Módulo 6</a>

<script>
function verificar(){
  if(localStorage.getItem("modulo1") === "concluido"){
    document.getElementById("m1").classList.add("concluido");
    document.getElementById("m1").innerText = "Módulo 1 ✅";
  }

  if(localStorage.getItem("modulo2") === "concluido"){
    document.getElementById("m2").classList.add("concluido");
    document.getElementById("m2").innerText = "Módulo 2 ✅";
  }

  if(localStorage.getItem("modulo3") === "concluido"){
    document.getElementById("m3").classList.add("concluido");
    document.getElementById("m3").innerText = "Módulo 3 ✅";
  }

  if(localStorage.getItem("modulo4") === "concluido"){
    document.getElementById("m4").classList.add("concluido");
    document.getElementById("m4").innerText = "Módulo 4 ✅";
  }

  if(localStorage.getItem("modulo5") === "concluido"){
    document.getElementById("m5").classList.add("concluido");
    document.getElementById("m5").innerText = "Módulo 5 ✅";
  }

  if(localStorage.getItem("modulo6") === "concluido"){
    document.getElementById("m6").classList.add("concluido");
    document.getElementById("m6").innerText = "Módulo 6 ✅";
  }
}

verificar();
</script>

</body>
</html>
