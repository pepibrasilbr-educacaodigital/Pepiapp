<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Plataforma • PEPI Brasil</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f3a;
  color:white;
}

/* LOADING */
.loading{
  position:fixed;
  width:100%;
  height:100vh;
  background:#0b1f3a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.spinner{
  border:5px solid #142c54;
  border-top:5px solid #f1c40f;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

/* LOGIN */
.login{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:#142c54;
  padding:30px;
  border-radius:12px;
  width:300px;
  animation:fadeUp 0.6s;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#f1c40f;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* TOPO */
.topo{
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
}

.nome{
  color:#f1c40f;
}

/* PROGRESSO */
.barra{
  background:#142c54;
  margin:20px 40px;
  padding:10px;
  border-radius:10px;
}

.barra-interna{
  height:20px;
  background:#2ecc71;
  border-radius:10px;
  width:0%;
  text-align:center;
  color:black;
  font-weight:bold;
  transition:1s;
}

/* GRID */
.container{
  padding:40px;
}

.grid{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  background:#142c54;
  padding:20px;
  border-radius:10px;
  width:250px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.08);
}

.locked{
  opacity:0.3;
}

.concluido{
  border:2px solid #2ecc71;
}

/* ANIMAÇÕES */
@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<!-- LOGIN -->
<div class="login" id="loginTela" style="display:none">
  <div class="login-box">
    <h2>Entrar</h2>
    <input id="nomeInput" placeholder="Seu nome">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- PLATAFORMA -->
<div id="plataforma" style="display:none">

<div class="topo">
  <div>PEPI Brasil</div>
  <div class="nome" id="nomeAluno"></div>
</div>

<div class="barra">
  <div class="barra-interna" id="barra"></div>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

</div>

<script>

// SOM
function playClick(){
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
  audio.play();
}

// LOADING
setTimeout(()=>{
  document.getElementById("loading").style.display="none";

  if(localStorage.getItem("nome")){
    document.getElementById("plataforma").style.display="block";
    iniciar();
  }else{
    document.getElementById("loginTela").style.display="flex";
  }

},1000);

// LOGIN
function entrar(){
  let nome = document.getElementById("nomeInput").value;
  if(!nome) return;

  localStorage.setItem("nome", nome);
  playClick();

  document.getElementById("loginTela").style.display="none";
  document.getElementById("plataforma").style.display="block";

  iniciar();
}

// INICIAR
function iniciar(){

  document.getElementById("nomeAluno").innerText =
  localStorage.getItem("nome");

  let atual = parseInt(localStorage.getItem("moduloAtual")) || 1;

  if(atual < 1) atual = 1;
  if(atual > 6) atual = 6;

  localStorage.setItem("moduloAtual", atual);

  let porcentagem = Math.round((atual-1)/6 * 100);

  let barra = document.getElementById("barra");

  setTimeout(()=>{
    barra.style.width = porcentagem + "%";
    barra.innerText = porcentagem + "%";
  },300);

  const modulos = [
    "modulo1.html",
    "modulo2.html",
    "modulo3.html",
    "modulo4.html",
    "modulo5.html",
    "modulo6.html"
  ];

  let grid = document.getElementById("grid");

  grid.innerHTML = "";

  modulos.forEach((m, index) => {

    let numero = index + 1;
    let liberado = numero <= atual;
    let concluido = numero < atual;

    let div = document.createElement("div");

    div.className = "card " +
      (liberado ? "" : "locked") +
      (concluido ? " concluido" : "");

    div.innerHTML = `
      <h3>Módulo ${numero}</h3>
      <button ${liberado ? "" : "disabled"}
      onclick="playClick(); window.location.href='${m}'">
        ${liberado ? "Assistir" : "Bloqueado"}
      </button>
    `;

    grid.appendChild(div);

  });

}

// CONFETE 🎉
function confete(){
  for(let i=0;i<50;i++){
    let el = document.createElement("div");
    el.style.position="fixed";
    el.style.width="8px";
    el.style.height="8px";
    el.style.background="gold";
    el.style.top=Math.random()*100+"%";
    el.style.left=Math.random()*100+"%";
    document.body.appendChild(el);

    setTimeout(()=>el.remove(),2000);
  }
}

</script>

</body>
</html>
