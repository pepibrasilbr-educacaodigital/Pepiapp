<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login do Gestor | PEPI Brasil</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1f3a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 35px;
      border-radius: 12px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #0b1f3a;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #f1c40f;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .link {
      margin-top: 15px;
      display: block;
      color: #0b1f3a;
      font-weight: bold;
      text-decoration: none;
    }

    .erro {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login do Gestor</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <a href="cadastro.html" class="link">Criar conta</a>

  <p id="erro" class="erro"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
  authDomain: "pepi-brasil.firebaseapp.com",
  projectId: "pepi-brasil"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

function login(){

  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  firebase.auth().signInWithEmailAndPassword(email, senha)
  .then(() => {
    window.location.href = "gestor.html";
  })
  .catch(() => {
    document.getElementById("erro").innerText = "Email ou senha inválidos";
  });

}
</script>

</body>
</html>
