<!DOCTYPE html>
<html>
<head>
  <title>Login Gestor</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #f1c40f;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
    }

    a {
      display: block;
      margin-top: 15px;
      text-decoration: none;
      color: #0b1f3a;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login do Gestor</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <a href="cadastro.html">Criar conta</a>

  <p id="erro" style="color:red;"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
  authDomain: "pepi-brasil.firebaseapp.com",
  projectId: "pepi-brasil"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

function login(){

  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  firebase.auth().signInWithEmailAndPassword(email, senha)
  .then(() => {
    window.location.href = "gestor.html";
  })
  .catch(() => {
    document.getElementById("erro").innerText = "Email ou senha inválidos";
  });

}
</script>

</body>
</html>
