<!DOCTYPE html>
<html>
<head>
  <title>Login - PEPI</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      width: 220px;
    }

    .button {
      background: #f1c40f;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Acesso do Aluno</h1>

<input type="text" id="nome" placeholder="Seu nome"><br>
<input type="text" id="turma" placeholder="Sua turma"><br>

<button class="button" onclick="entrar()">Entrar</button>

<p id="erro"></p>

<script>
function entrar(){
  let nome = document.getElementById("nome").value;
  let turma = document.getElementById("turma").value;

  if(nome !== "" && turma !== ""){
    localStorage.setItem("nomeAluno", nome);
    localStorage.setItem("turmaAluno", turma);

    window.location.href = "aluno.html";
  } else {
    document.getElementById("erro").innerText = "Preencha todos os campos";
  }
}
</script>

</body>
</html>
