<!DOCTYPE html>
<html>
<head>
  <title>Área do Aluno</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #f1c40f;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Área do Aluno</h2>

  <input type="text" id="nome" placeholder="Seu nome">
  <input type="text" id="turma" placeholder="Sua turma">
  <input type="text" id="escola" placeholder="Nome da escola">

  <button onclick="entrar()">Entrar</button>

</div>

<script>
function entrar(){

  let nome = document.getElementById("nome").value;
  let turma = document.getElementById("turma").value;
  let escola = document.getElementById("escola").value;

  if(!nome || !turma || !escola){
    alert("Preencha todos os campos");
    return;
  }

  localStorage.setItem("nome", nome);
  localStorage.setItem("turma", turma);
  localStorage.setItem("escola", escola);

  window.location.href = "modulo1.html";

}
</script>

</body>
</html>
