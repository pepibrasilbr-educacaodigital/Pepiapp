<!DOCTYPE html>
<html>
<head>
  <title>Módulo 6 - Uso Inteligente</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
    }

    .button {
      background: #f1c40f;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: black;
      display: inline-block;
      margin-top: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .final {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #2ecc71;
    }
  </style>
</head>

<body>

<h1>Módulo 6 - Uso Inteligente</h1>

<div class="box">

  <p>
  A internet pode ser usada para aprender, crescer e construir oportunidades.
  </p>

  <p>
  O uso inteligente significa saber quando usar, como usar e com responsabilidade.
  </p>

  <p>
  Use o digital a seu favor: para estudar, desenvolver habilidades e evoluir.
  </p>

  <button class="button" onclick="concluir()">Marcar como concluído</button>

  <p id="status"></p>

  <div id="finalMsg" class="final"></div>

  <a class="button" href="pepi.pdf" target="_blank">
    Ver conteúdo completo
  </a>

</div>

<br>

<a href="aluno.html" class="button">⬅ Voltar</a>

<script>
function concluir(){
  localStorage.setItem("modulo6", "concluido");
  document.getElementById("status").innerText = "✅ Aula concluída!";
  verificarFinal();
}

function verificarFinal(){
  let completo = true;

  for(let i=1; i<=6; i++){
    if(!localStorage.getItem("modulo"+i)){
      completo = false;
    }
  }

  if(completo){
    document.getElementById("finalMsg").innerText = "🎉 Parabéns! Você concluiu todo o programa!";
  }
}

if(localStorage.getItem("modulo6") === "concluido"){
  document.getElementById("status").innerText = "✅ Você já concluiu este módulo";
}

verificarFinal();
</script>

</body>
</html>
