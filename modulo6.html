<!DOCTYPE html>
<html>
<head>
  <title>Conclusão</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 320px;
    }

    button {
      padding: 12px;
      width: 100%;
      background: #f1c40f;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Parabéns 🎉</h2>
  <p>Você concluiu o curso!</p>

  <button onclick="gerarCertificado()">Gerar Certificado</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
  authDomain: "pepi-brasil.firebaseapp.com",
  projectId: "pepi-brasil"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔒 bloqueio final
if(localStorage.getItem("modulo5") !== "ok"){
  alert("Conclua o módulo 5 primeiro");
  window.location.href = "modulo5.html";
}

function gerarCertificado(){

  let nome = localStorage.getItem("nome");
  let turma = localStorage.getItem("turma");
  let escola = localStorage.getItem("escola");

  let codigo = "PEPI-" + Math.floor(Math.random() * 100000);
  let data = new Date().toLocaleDateString();

  db.collection("certificados").doc(codigo).set({
    nome,
    turma,
    escola,
    data
  });

  alert("Certificado enviado para a escola!");

}
</script>

</body>
</html>
