<!DOCTYPE html>
<html>
<head>
  <title>Módulo 6 - Uso Inteligente</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
    }

    .button {
      background: #f1c40f;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: black;
      display: inline-block;
      margin-top: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .final {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #2ecc71;
    }
  </style>
</head>

<body>

<h1>Módulo 6 - Uso Inteligente</h1>

<div class="box">

  <p>
  A internet pode ser uma ferramenta poderosa para aprender e crescer.
  </p>

  <button class="button" onclick="concluir()">Marcar como concluído</button>

  <p id="status"></p>

  <div id="finalMsg" class="final"></div>

  <button id="btnCertificado" class="button" onclick="gerarCertificado()" style="display:none;">
    🎓 Gerar Certificado
  </button>

</div>

<br>

<a href="aluno.html" class="button">⬅ Voltar</a>

<script>
function concluir(){
  localStorage.setItem("modulo6", "concluido");
  document.getElementById("status").innerText = "✅ Aula concluída!";
  verificarFinal();
}

function verificarFinal(){
  let completo = true;

  for(let i=1; i<=6; i++){
    if(!localStorage.getItem("modulo"+i)){
      completo = false;
    }
  }

  if(completo){
    document.getElementById("finalMsg").innerText =
      "🎉 Parabéns! Você concluiu todo o programa!";
    
    document.getElementById("btnCertificado").style.display = "inline-block";
  }
}

function gerarCertificado(){
  let nome = localStorage.getItem("nomeAluno");
  let turma = localStorage.getItem("turmaAluno");
  let data = new Date().toLocaleDateString("pt-BR");

  let novaJanela = window.open("", "_blank");

  novaJanela.document.write(`
    <html>
    <head>
      <title>Certificado</title>

      <style>
        body {
          margin: 0;
          font-family: 'Georgia', serif;
          background: #f5f5f5;
        }

        .container {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }

        .certificado {
          background: white;
          padding: 50px;
          border: 8px solid #0b1f3a;
          width: 800px;
          text-align: center;
          box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .logo img {
          width: 120px;
          margin-bottom: 10px;
        }

        h1 {
          font-size: 40px;
          color: #0b1f3a;
        }

        h2 {
          font-size: 32px;
          margin: 20px 0;
          color: #facc15;
        }

        p {
          font-size: 18px;
          margin: 10px 0;
        }

        .assinatura {
          margin-top: 40px;
        }

        .linha {
          width: 200px;
          border-top: 2px solid #000;
          margin: 10px auto;
        }

        .footer {
          margin-top: 20px;
          font-size: 14px;
          opacity: 0.7;
        }
      </style>
    </head>

    <body>

      <div class="container">
        <div class="certificado">

          <div class="logo">
            <img src="logo.png">
          </div>

          <h1>CERTIFICADO</h1>

          <p>Certificamos que</p>

          <h2>${nome}</h2>

          <p>da turma ${turma}</p>

          <p>concluiu com êxito o programa</p>

          <p><strong>PEPI Digital Shield</strong></p>

          <p>Educação e Segurança Digital</p>

          <div class="assinatura">
            <div class="linha"></div>
            <p>Coordenação PEPI Brasil</p>
          </div>

          <div class="footer">
            Emitido em ${data}
          </div>

        </div>
      </div>

    </body>
    </html>
  `);
}

if(localStorage.getItem("modulo6") === "concluido"){
  document.getElementById("status").innerText = "✅ Você já concluiu este módulo";
}

verificarFinal();
</script>

</body>
</html>
