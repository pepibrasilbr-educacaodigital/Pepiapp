<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbebqGKrR6jfrWWPjRyZ3dMpVjQf-M7uI",
  authDomain: "pepi-brasil.firebaseapp.com",
  projectId: "pepi-brasil",
  storageBucket: "pepi-brasil.appspot.com",
  messagingSenderId: "937753921449",
  appId: "1:937753921449:web:b10c09928e625a905526b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.gerarCertificado = async function(){

  let nome = localStorage.getItem("nomeAluno");
  let turma = localStorage.getItem("turmaAluno");
  let data = new Date().toLocaleDateString("pt-BR");

  let codigo = "PEPI-" + Math.floor(10000 + Math.random() * 90000);

  // 🔥 SALVA NO FIREBASE
  await setDoc(doc(db, "certificados", codigo), {
    nome: nome,
    turma: turma,
    data: data
  });

  let qrLink = "https://pepibrasilbr-educacaodigital.github.io/Pepiapp/validar.html?codigo=" + codigo;

  let novaJanela = window.open("", "_blank");

  novaJanela.document.write(`
    <html>
    <body style="font-family:Times New Roman;text-align:center;padding:40px;">
      <h1>CERTIFICADO</h1>
      <p>${nome}</p>
      <p>${turma}</p>
      <p>${data}</p>
      <p>Código: ${codigo}</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${qrLink}">
      <br><br>
      <button onclick="window.print()">Baixar PDF</button>
    </body>
    </html>
  `);
}
</script>
